<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SenaX - Bate-papo</title>
    <link rel="icon" href="../assets/img/S-logo-escura.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/chat.css">
</head>
<body>
    <!-- (SIDEBAR)BARRA DE NAVEGAÇÃO -->
    <aside class="sidebar">

        <div class="sidebar-top">
            <img src="../assets/img/logo-clara.png" alt="SenaX" class="sidebar-logo">

            <div class="search-container">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Buscar">
            </div>

            <nav class="nav-links">
                <a href="./page_inicial.html">
                    <i class="fa-solid fa-house"></i>
                    <span>Página inicial</span>
                </a>
                <a href="./chat.html">
                    <i class="fa-solid fa-envelope"></i>
                    <span>Bate-papo</span>
                </a>
                <a href="./perfil.html">
                    <i class="fa-solid fa-user"></i>
                    <span>Perfil</span>
                </a>
                <a href="#" id="btnLogout">
                    <i class="fa-solid fa-right-from-bracket"></i> 
                    <span>Sair</span>
                </a>
            </nav>

            <button class="btn-postar">
                <span>Postar</span>
                <i class="fa-solid fa-plus"></i>
            </button>
        </div>
    
        <div class="user-footer">
            <img id="userAvatar" class="user-avatar">
            <span id="userName" class="user-name"></span>
        </div>

    </aside>

    <main class="container">
        <!-- LISTA DE CONVERSAS -->
        <section class="chat-list">
            <header>
                <h2>Mensagens</h2>
            </header>

            <div id="lista-contatos"></div>
        </section>


        <!-- ÁREA DO CHAT -->
        <section class="chat-area">

            <!-- estado vazio -->
            <div id="chat-vazio" class="empty-state">
                <i class="fa-regular fa-comments"></i>
                <p>Selecione uma conversa</p>
            </div>

            <!-- chat ativo -->
            <div id="chat-ativo" class="chat-box">

                <!-- header -->
                <header class="chat-header">
                    <button id="btn-voltar" style="display:none;">←</button>
                    <img id="chat-target-avatar">
                    <div>
                        <strong id="chat-target-name"></strong>
                        <div id="digitando-indicator"></div>
                    </div>
                </header>

                <!-- mensagens -->
                <div id="chat-messages" class="messages"></div>

                <!-- input -->
                <div class="chat-input">
                    <input type="text" id="msg-input" placeholder="Digite uma mensagem...">
                    <button id="btn-enviar-msg">
                        <i class="fa fa-paper-plane"></i>
                    </button>
                </div>

            </div>
        </section>

    </main>

    <script type="module" src="../assets/js/chat.js"></script>
</body>
</html>
