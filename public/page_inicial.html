<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SenaX</title>

    <link rel="icon" href="/assets/img/S-logo-escura.png">

    <!-- Font Awesome Oficial -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="/assets/css/style-pgInicial.css">
</head>
<body>

    <aside class="sidebar">

        <div class="sidebar-top">
            <img src="/assets/img/logo-clara.png" alt="SenaX" class="sidebar-logo">

            <div class="search-container">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Buscar">
            </div>

            <nav class="nav-links">
                <a href="page_inicial.html">
                    <i class="fa-solid fa-house"></i>
                    <span>Página inicial</span>
                </a>
                <a href="#">
                    <i class="fa-solid fa-envelope"></i>
                    <span>Bate-papo</span>
                </a>
                <a href="#">
                    <i class="fa-solid fa-user"></i>
                    <span>Perfil</span>
                </a>
                <a href="#" class="btn-sair">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span>Sair</span>
                </a>
            </nav>

            <button class="btn-postar">
                <span>Postar</span>
                <i class="fa-solid fa-plus"></i>
            </button>
        </div>
    
        <div class="user-footer">
            <img id="userAvatar" class="user-avatar">
            <span id="userName" class="user-name"></span>
        </div>

    </aside>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Configurações do Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyB19gxl7E3NeqKKZ9pNe634wtbkghXNSVM",
            authDomain: "senax-rede.firebaseapp.com",
            databaseURL: "https://senax-rede-default-rtdb.firebaseio.com/",
            projectId: "senax-rede",
            storageBucket: "senax-rede.firebasestorage.app",
            messagingSenderId: "714869150902",
            appId: "1:714869150902:web:2ee1f1d634624113a4c217"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        // Monitora o estado da autenticação
        onAuthStateChanged(auth, (user) => {
            if (user) {
                const uid = user.uid;
                const userRef = ref(db, "usuarios/" + uid);

                // Busca os dados do usuário no banco
                get(userRef).then((snapshot) => {
                    if (snapshot.exists()) {
                        const dados = snapshot.val();
                        document.getElementById("userName").innerText = dados.nome;
                        document.getElementById("userAvatar").src = dados.fotoPerfil || "/assets/img/default-avatar.png";
                    }
                }).catch((error) => {
                    console.error("Erro ao carregar dados:", error);
                });
            } else {
                // Se não houver usuário logado, volta para o login
                window.location.href = "index.html";
            }
        });

        // Lógica de Logout
        const btnSair = document.querySelector(".btn-sair");
        btnSair.addEventListener("click", (e) => {
            e.preventDefault();
            signOut(auth).then(() => {
                window.location.href = "index.html";
            }).catch((error) => {
                alert("Erro ao sair: " + error.message);
            });
        });
    </script>
</body>
</html>
