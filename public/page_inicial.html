<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SenaX</title>

    <link rel="icon" href="../assets/img/S-logo-escura.png">

    <!-- Font Awesome Oficial -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="../assets/css/style-pgInicial.css">
</head>
<body>

    <!-- (SIDEBAR)BARRA DE NAVEGAÇÃO -->
    <aside class="sidebar">

        <div class="sidebar-top">
            <img src="../assets/img/logo-clara.png" alt="SenaX" class="sidebar-logo">

            <div class="search-container">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Buscar">
            </div>

            <nav class="nav-links">
                <a href="./page_inicial.html">
                    <i class="fa-solid fa-house"></i>
                    <span>Página inicial</span>
                </a>
                <a href="#">
                    <i class="fa-solid fa-envelope"></i>
                    <span>Bate-papo</span>
                </a>
                <a href="./perfil.html">
                    <i class="fa-solid fa-user"></i>
                    <span>Perfil</span>
                </a>
                <a href="#" id="btnLogout">
                    <i class="fa-solid fa-right-from-bracket"></i> 
                    <span>Sair</span>
                </a>
            </nav>

            <button class="btn-postar">
                <span>Postar</span>
                <i class="fa-solid fa-plus"></i>
            </button>
        </div>
    
        <div class="user-footer">
            <img id="userAvatar" class="user-avatar">
            <span id="userName" class="user-name"></span>
        </div>

    </aside>

    <!-- MAIN(FEED) -->
    <main class="feed-container">
        <header class="feed-header">
            <div class="tab active" id="tab-para-voce">Para você</div>
            <div class="tab" id="tab-seguindo">Seguindo</div>
        </header>

        <section class="create-post">
            <div class="post-input-wrapper">
                <img id="postAvatar" class="user-avatar-mini">
                <textarea id="postText" placeholder="O que está acontecendo?"></textarea>
            </div>

            <div class="post-actions">
                <label for="file-input">
                    <i class="fa-regular fa-image"></i>
                </label>
                <input type="file" id="file-input" hidden>
                <button class="btn-post-submit">Postar</button>
            </div>
        </section>

        <section id="posts-feed">
            <!-- Posts serão carregados aqui -->
        </section>
    </main>

    <!-- SCRIPT PRINCIPAL -->
    <script type="module" src="../assets/js/main.js" defer></script>
    <script type="module" src="../assets/js/feed.js" ></script>
</body>
</html>
