<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SenaX</title>

    <link rel="icon" href="../assets/img/S-logo-escura.png">

    <!-- Font Awesome Oficial -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/perfil.css">
</head>
<body>
    <!-- (SIDEBAR)BARRA DE NAVEGAÇÃO -->
    <aside class="sidebar">
        <div class="sidebar-top">
            <img src="../assets/img/logo-clara.png" alt="SenaX" class="sidebar-logo">

            <div class="search-container">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Buscar">
            </div>

            <nav class="nav-links">
                <a href="./page_inicial.html">
                    <i class="fa-solid fa-house"></i>
                    <span>Página inicial</span>
                </a>
                <a href="#">
                    <i class="fa-solid fa-envelope"></i>
                    <span>Bate-papo</span>
                </a>
                <a href="./perfil.html">
                    <i class="fa-solid fa-user"></i>
                    <span>Perfil</span>
                </a>
                <a href="#" id="btnLogout">
                    <i class="fa-solid fa-right-from-bracket"></i> 
                    <span>Sair</span>
                </a>
            </nav>

            <button class="btn-postar">
                <span>Postar</span>
                <i class="fa-solid fa-plus"></i>
            </button>
        </div>
    
        <div class="user-footer">
            <img id="userAvatar" class="user-avatar">
            <span id="userName" class="user-name"></span>
        </div>
    </aside>

    <!-- MAIN(PERFIL) -->
     <main class="feed-container">
        <div class="perfil-header-container">
            <img id="perfil-avatar" src="../assets/img/default-avatar.png" class="avatar-perfil">
            <h2 id="perfil-nome">Carregando...</h2>
            <p id="perfil-turma" class="info-turma"></p>
            <p id="perfil-descricao"></p>
            <button id="btn-seguir-acao" class="btn-seguir">Seguir</button>

            <button id="btn-editar-perfil" class="btn-editar" style="display: none;">Editar Perfil</button>
        </div>

        <div id="posts-usuario">
            </div>
     </main>

    <!-- SCRIPTS -->
    <script type="module" src="../assets/js/main.js"></script>
    <script type="module" src="../assets/js/perfil.js"></script>
</body>
</html>
